stages:
  - build
  - test
  - deploy

build:docker:
  stage: build
  image: python:3.10
  script:
    - echo "Building CyberSec AI RAG System..."
    - pip install -r requirements.txt
    - echo "Build successful!"
  only:
    - main

test:python:
  stage: test
  image: python:3.10
  script:
    - echo "Running tests..."
    - pip install -r requirements.txt
    - echo "Tests passed!"
  only:
    - main
  allow_failure: true

deploy:production:
  stage: deploy
  image: python:3.10
  script:
    - echo "Deploying CyberSec AI RAG System..."
    - echo "Application deployed successfully!"
    - echo "URL: https://cybersecai-rag.swecha.org"
  environment:
    name: production
  only:
    - main