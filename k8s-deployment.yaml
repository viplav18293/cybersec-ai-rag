apiVersion: apps/v1
kind: Deployment
metadata:
  name: cybersecai-rag
  labels:
    app: cybersecai-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cybersecai-rag
  template:
    metadata:
      labels:
        app: cybersecai-rag
    spec:
      containers:
      - name: cybersecai-rag
        image: registry.gitlab.com/viplav/cybersecai-rag:latest
        ports:
        - containerPort: 8501
        env:
        - name: STREAMLIT_SERVER_PORT
          value: "8501"
        - name: STREAMLIT_SERVER_ADDRESS
          value: "0.0.0.0"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cybersecai-rag-service
spec:
  selector:
    app: cybersecai-rag
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8501
  type: LoadBalancer